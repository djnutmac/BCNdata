<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Dashboard - Barcellona</title>
    
    <!-- Tailwind CSS per il design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS per la mappa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Chart.js per i grafici -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        #map { z-index: 1; }
        
        /* Animazione per i sensori critici sulla mappa */
        .pulse-red {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-red-anim 2s infinite;
        }
        @keyframes pulse-red-anim {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-gray-800">

    <!-- Header / Navbar -->
    <header class="bg-indigo-900 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <i data-lucide="activity" class="text-indigo-400"></i>
            <h1 class="text-xl font-bold">Barcelona Smart City <span class="text-sm font-normal text-indigo-300 ml-2">Open Data BCN</span></h1>
        </div>
        <div class="text-sm bg-indigo-800 px-3 py-1 rounded-full border border-indigo-700 flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
            Sistema Attivo
        </div>
    </header>

    <!-- Alert Panel (Semaforo) -->
    <div class="bg-white border-b shadow-sm p-4 grid grid-cols-3 gap-4 shrink-0 z-10">
        <div class="flex items-center justify-between p-3 bg-red-50 rounded-lg border border-red-100">
            <div class="flex items-center gap-3">
                <div class="text-2xl">🔴</div>
                <div>
                    <div class="text-sm text-gray-500 font-medium">Allarmi Critici</div>
                    <div class="text-xl font-bold text-red-700" id="count-critical">0</div>
                </div>
            </div>
            <i data-lucide="alert-triangle" class="text-red-300 w-8 h-8"></i>
        </div>
        <div class="flex items-center justify-between p-3 bg-yellow-50 rounded-lg border border-yellow-100">
            <div class="flex items-center gap-3">
                <div class="text-2xl">🟡</div>
                <div>
                    <div class="text-sm text-gray-500 font-medium">Attenzione</div>
                    <div class="text-xl font-bold text-yellow-700" id="count-warning">0</div>
                </div>
            </div>
            <i data-lucide="alert-circle" class="text-yellow-300 w-8 h-8"></i>
        </div>
        <div class="flex items-center justify-between p-3 bg-green-50 rounded-lg border border-green-100">
            <div class="flex items-center gap-3">
                <div class="text-2xl">🟢</div>
                <div>
                    <div class="text-sm text-gray-500 font-medium">Sensori Normali</div>
                    <div class="text-xl font-bold text-green-700" id="count-normal">0</div>
                </div>
            </div>
            <i data-lucide="check-circle" class="text-green-300 w-8 h-8"></i>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Left: Map -->
        <div id="map" class="flex-1 h-1/2 md:h-full relative"></div>

        <!-- Right: Sidebar (Details & Charts) -->
        <div class="w-full md:w-[400px] lg:w-[450px] bg-white border-l shadow-2xl flex flex-col h-1/2 md:h-full z-10">
            
            <!-- Chart Section -->
            <div class="p-5 border-b bg-gray-50 shrink-0">
                <h2 class="text-lg font-semibold mb-1" id="chart-title">Seleziona un sensore</h2>
                <p class="text-sm text-gray-500 mb-4" id="chart-subtitle">Clicca sulla mappa per vedere i dati storici</p>
                <div class="h-48 w-full">
                    <canvas id="sensorChart"></canvas>
                </div>
            </div>

            <!-- List Section -->
            <div class="p-4 flex-1 overflow-y-auto">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold text-gray-700">Elenco Sensori</h3>
                    <div class="flex gap-2 text-sm">
                        <button onclick="filterSensors('all')" class="hover:text-indigo-600 font-medium text-indigo-600">Tutti</button>
                        <button onclick="filterSensors('traffic')" class="hover:text-gray-900 text-gray-400">Traffico</button>
                        <button onclick="filterSensors('air')" class="hover:text-gray-900 text-gray-400">Aria</button>
                    </div>
                </div>
                <div id="sensor-list" class="space-y-3">
                    <!-- I sensori verranno iniettati qui da JS -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Inizializza le icone Lucide
        lucide.createIcons();

        // 1. INIZIALIZZAZIONE MAPPA (Centrata su Barcellona)
        const map = L.map('map').setView([41.3851, 2.1734], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 2. VARIABILI DI STATO
        let sensors = [];
        let mapMarkers = [];
        let chartInstance = null;
        let currentFilter = 'all';

        // 3. GENERATORE DI DATI (Simula le API di Open Data BCN)
        // Nota: in un'app di produzione, qui useresti fetch('https://opendata-ajuntament.barcelona.cat/data/api/...')
        function generateMockData() {
            const types = [
                { id: 'traffic', name: 'Traffico (Congestione %)', unit: '%', icon: '🚗', range: [10, 100] },
                { id: 'air', name: 'Qualità Aria (PM10 µg/m³)', unit: 'µg/m³', icon: '💨', range: [5, 60] },
                { id: 'temp', name: 'Meteo (Temperatura)', unit: '°C', icon: '🌡️', range: [15, 32] }
            ];

            const locations = [
                { name: "Plaça Catalunya", lat: 41.3870, lng: 2.1700 },
                { name: "Sagrada Familia", lat: 41.4036, lng: 2.1744 },
                { name: "Barceloneta", lat: 41.3784, lng: 2.1925 },
                { name: "Camp Nou", lat: 41.3809, lng: 2.1228 },
                { name: "Park Güell", lat: 41.4145, lng: 2.1527 },
                { name: "Passeig de Gràcia", lat: 41.3934, lng: 2.1646 },
                { name: "Plaça d'Espanya", lat: 41.3750, lng: 2.1491 },
                { name: "Port Olímpic", lat: 41.3879, lng: 2.1994 }
            ];

            const mockSensors = [];

            locations.forEach((loc, index) => {
                // Assegna 1 o 2 sensori a ogni location
                const numSensors = Math.floor(Math.random() * 2) + 1;
                for(let i=0; i<numSensors; i++) {
                    const type = types[Math.floor(Math.random() * types.length)];
                    
                    // Genera valore corrente
                    const currentValue = Math.floor(Math.random() * (type.range[1] - type.range[0]) + type.range[0]);
                    
                    // Calcola lo stato (Semaforo)
                    let status = 'green';
                    if (type.id === 'traffic' && currentValue > 80) status = 'red';
                    else if (type.id === 'traffic' && currentValue > 60) status = 'yellow';
                    if (type.id === 'air' && currentValue > 45) status = 'red';
                    else if (type.id === 'air' && currentValue > 30) status = 'yellow';
                    if (type.id === 'temp' && currentValue > 30) status = 'red';
                    else if (type.id === 'temp' && currentValue > 27) status = 'yellow';

                    // Genera storico (ultime 12 ore)
                    const history = [];
                    let lastVal = currentValue;
                    for(let h=12; h>=1; h--) {
                        lastVal = lastVal + (Math.random() * 10 - 5);
                        if(lastVal < 0) lastVal = 5;
                        history.push(Math.round(lastVal));
                    }
                    history.reverse(); // cronologico
                    history.push(currentValue); // aggiungi l'attuale

                    // Sposta leggermente i marker se ci sono più sensori nello stesso posto
                    const offsetLat = loc.lat + (Math.random() * 0.002 - 0.001);
                    const offsetLng = loc.lng + (Math.random() * 0.002 - 0.001);

                    mockSensors.push({
                        id: `sn_${index}_${i}`,
                        name: `${type.icon} ${type.name} - ${loc.name}`,
                        type: type.id,
                        unit: type.unit,
                        lat: offsetLat,
                        lng: offsetLng,
                        value: currentValue,
                        status: status,
                        history: history,
                        timestamp: new Date().toLocaleTimeString()
                    });
                }
            });

            return mockSensors;
        }

        // 4. RENDERING DELL'INTERFACCIA
        function renderDashboard() {
            // Conta stati per i pannelli alert
            let cRed = 0, cYellow = 0, cGreen = 0;
            
            // Pulisci mappa e lista
            mapMarkers.forEach(m => map.removeLayer(m));
            mapMarkers = [];
            const listEl = document.getElementById('sensor-list');
            listEl.innerHTML = '';

            sensors.forEach(sensor => {
                if(currentFilter !== 'all' && sensor.type !== currentFilter) return;

                // Statistiche
                if(sensor.status === 'red') cRed++;
                else if(sensor.status === 'yellow') cYellow++;
                else cGreen++;

                // Aggiungi Marker sulla Mappa (HTML Custom)
                let colorClass = 'bg-green-500';
                if(sensor.status === 'red') colorClass = 'bg-red-500 pulse-red';
                if(sensor.status === 'yellow') colorClass = 'bg-yellow-400';

                const iconHtml = `<div class="w-4 h-4 rounded-full ${colorClass} border-2 border-white shadow-md cursor-pointer hover:scale-150 transition-transform"></div>`;
                const customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [16,16], iconAnchor: [8,8] });
                
                const marker = L.marker([sensor.lat, sensor.lng], { icon: customIcon }).addTo(map);
                marker.bindTooltip(sensor.name);
                marker.on('click', () => selectSensor(sensor));
                mapMarkers.push(marker);

                // Aggiungi alla Lista Sidebar
                const item = document.createElement('div');
                item.className = 'p-3 rounded-lg border bg-white hover:bg-gray-50 cursor-pointer transition-colors flex justify-between items-center';
                item.onclick = () => selectSensor(sensor);
                
                let dotColor = sensor.status === 'red' ? 'text-red-500' : (sensor.status === 'yellow' ? 'text-yellow-500' : 'text-green-500');
                
                item.innerHTML = `
                    <div>
                        <div class="font-medium text-gray-800 text-sm">${sensor.name}</div>
                        <div class="text-xs text-gray-400 mt-1">Ultimo agg: ${sensor.timestamp}</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-lg">${sensor.value} <span class="text-xs font-normal text-gray-500">${sensor.unit}</span></span>
                        <div class="${dotColor}">●</div>
                    </div>
                `;
                listEl.appendChild(item);
            });

            // Aggiorna contatori Header
            document.getElementById('count-critical').innerText = cRed;
            document.getElementById('count-warning').innerText = cYellow;
            document.getElementById('count-normal').innerText = cGreen;
        }

        // 5. GESTIONE SELEZIONE E GRAFICI
        function selectSensor(sensor) {
            // Centra mappa
            map.flyTo([sensor.lat, sensor.lng], 15, { duration: 1.5 });

            // Aggiorna titoli
            document.getElementById('chart-title').innerText = sensor.name;
            document.getElementById('chart-subtitle').innerText = `Stato attuale: ${sensor.value} ${sensor.unit}`;

            // Colore grafico basato sullo stato
            let graphColor = '#22c55e'; // green
            let graphBg = 'rgba(34, 197, 94, 0.1)';
            if(sensor.status === 'red') { graphColor = '#ef4444'; graphBg = 'rgba(239, 68, 68, 0.1)'; }
            if(sensor.status === 'yellow') { graphColor = '#eab308'; graphBg = 'rgba(234, 179, 8, 0.1)'; }

            // Labels temporali (Ultime 12 ore)
            const labels = [];
            const now = new Date();
            for(let i=12; i>=0; i--) {
                let d = new Date(now.getTime() - (i * 60 * 60 * 1000));
                labels.push(d.getHours() + ":00");
            }

            // Distruggi vecchio grafico se esiste
            if(chartInstance) {
                chartInstance.destroy();
            }

            // Crea nuovo grafico
            const ctx = document.getElementById('sensorChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Andamento (${sensor.unit})`,
                        data: sensor.history,
                        borderColor: graphColor,
                        backgroundColor: graphBg,
                        borderWidth: 2,
                        pointRadius: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // 6. FILTRI
        function filterSensors(type) {
            currentFilter = type;
            renderDashboard();
        }

        // START APP
        window.onload = () => {
            sensors = generateMockData();
            renderDashboard();
            
            // Seleziona il primo sensore di default per popolare il grafico
            if(sensors.length > 0) {
                selectSensor(sensors[0]);
            }
            
            // Simula aggiornamenti in tempo reale ogni 10 secondi
            setInterval(() => {
                sensors = generateMockData();
                renderDashboard();
            }, 10000);
        };
    </script>
</body>
</html>
