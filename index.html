<body>
<div id="root"><div class="ld"><div class="spin"></div><p>CARREGANT TMB BUS TRACKER...</p></div></div>
<script>
const {useState,useEffect,useRef,useCallback} = React;

// === TMB API ===
var APP_ID="a5d88368";
var APP_KEY="4a578607c30c461a8fd7729700711337";
var BASE="https://api.tmb.cat/v1";
var PROXIES=[
  "https://corsproxy.io/?",
  "https://api.allorigins.win/raw?url=",
  "https://cors-anywhere.herokuapp.com/"
];

function apiUrl(path){
  var sep=path.indexOf("?")>=0?"&":"?";
  return BASE+path+sep+"app_id="+APP_ID+"&app_key="+APP_KEY;
}

// Fetch with timeout
function fetchWithTimeout(url,opts,ms){
  return new Promise(function(resolve,reject){
    var timeout=setTimeout(function(){reject(new Error("Timeout"));},ms);
    fetch(url,opts).then(function(r){clearTimeout(timeout);resolve(r);}).catch(function(e){clearTimeout(timeout);reject(e);});
  });
}

async function fetchTMB(path){
  var directUrl=apiUrl(path);

  // Try direct with 8s timeout
  try{
    var r=await fetchWithTimeout(directUrl,{headers:{Accept:"application/json"}},8000);
    if(r.ok) return await r.json();
  }catch(e){}

  // Try each proxy with 8s timeout
  for(var i=0;i<PROXIES.length;i++){
    try{
      var r=await fetchWithTimeout(PROXIES[i]+encodeURIComponent(directUrl),{},8000);
      if(r.ok) return await r.json();
    }catch(e){}
  }

  throw new Error("API error");
}

async function getAllStops(){
  var data=await fetchTMB("/ibus/stops/");
  return (data&&data.data&&data.data.ibus)||[];
}

async function getStopForecast(code){
  return await fetchTMB("/itransit/bus/parades/"+code);
}

async function getTransitLines(){
  try{
    var data=await fetchTMB("/transit/linies/bus?type=json");
    var seen=new Map();
    var feats=data.features||[];
    for(var i=0;i<feats.length;i++){
      var f=feats[i];
      var code=f.properties.CODI_LINIA||"";
      var name=f.properties.NOM_LINIA||"";
      if(code&&!seen.has(code)) seen.set(code,{codi_linia:code,nom_linia:name});
    }
    var arr=Array.from(seen.values());
    arr.sort(function(a,b){
      var an=parseInt(a.codi_linia),bn=parseInt(b.codi_linia);
      if(!isNaN(an)&&!isNaN(bn)) return an-bn;
      if(!isNaN(an)) return -1;
      if(!isNaN(bn)) return 1;
      return a.codi_linia.localeCompare(b.codi_linia);
    });
    return arr;
  }catch(e){
    var stops=await getAllStops();
    var seen=new Map();
    for(var i=0;i<stops.length;i++){
      var s=stops[i];
      var codes=s.codis_linies||[];
      for(var j=0;j<codes.length;j++){
        var c=codes[j];
        if(!seen.has(c)) seen.set(c,{codi_linia:c,nom_linia:c});
      }
    }
    var arr=Array.from(seen.values());
    arr.sort(function(a,b){return a.codi_linia.localeCompare(b.codi_linia);});
    return arr;
  }
}

async function getLineStops(code,direction){
  var path="/transit/parades/bus?type=json&codi_linia="+code;
  if(direction) path+="&id_sentit="+direction;
  return await fetchTMB(path);
}

async function getItineraries(fromLat,fromLon,toLat,toLon){
  return await fetchTMB("/planner/plan?fromPlace="+fromLat+","+fromLon+"&toPlace="+toLat+","+toLon+"&mode=WALK,BUS,TRANSIT&locale=ca");
}

function getMinsUntil(ts){return Math.max(0,Math.floor((ts-Math.floor(Date.now()/1000))/60));}
function dirLabel(id){return id===1?"ANADA":"TORNADA";}

// === LocalStorage ===
function loadLS(key,fallback){
  try{var v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}
}
function saveLS(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

// === useFavorites Hook ===
function useFavorites(){
  var _a=useState(function(){return loadLS("tmb_fav_stops",[]);}),stops=_a[0],setStops=_a[1];
  var _b=useState(function(){return loadLS("tmb_fav_lines",[]);}),lines=_b[0],setLines=_b[1];
  useEffect(function(){saveLS("tmb_fav_stops",stops);},[stops]);
  useEffect(function(){saveLS("tmb_fav_lines",lines);},[lines]);
  var addStop=useCallback(function(s){setStops(function(p){return p.some(function(x){return x.codi_parada===s.codi_parada;})?p:[].concat(p,[Object.assign({},s,{addedAt:Date.now()})]);});},[]);
  var removeStop=useCallback(function(c){setStops(function(p){return p.filter(function(x){return x.codi_parada!==c;});});},[]);
  var isStopFav=useCallback(function(c){return stops.some(function(x){return x.codi_parada===c;});},[stops]);
  var addLine=useCallback(function(l){setLines(function(p){return p.some(function(x){return x.codi_linia===l.codi_linia;})?p:[].concat(p,[Object.assign({},l,{addedAt:Date.now()})]);});},[]);
  var removeLine=useCallback(function(c){setLines(function(p){return p.filter(function(x){return x.codi_linia!==c;});});},[]);
  var isLineFav=useCallback(function(c){return lines.some(function(x){return x.codi_linia===c;});},[lines]);
  return {stops:stops,lines:lines,addStop:addStop,removeStop:removeStop,isStopFav:isStopFav,addLine:addLine,removeLine:removeLine,isLineFav:isLineFav};
}

// === StopInfoPanel ===
function StopInfoPanel(props){
  var stopCode=props.stopCode,stopName=props.stopName,isFav=props.isFav,onToggleFav=props.onToggleFav,onClose=props.onClose;
  var _a=useState(null),data=_a[0],setData=_a[1];
  var _b=useState(true),loading=_b[0],setLoading=_b[1];
  var _c=useState(null),error=_c[0],setError=_c[1];
  var _d=useState(null),ts=_d[0],setTs=_d[1];

  var load=useCallback(async function(){
    setLoading(true);setError(null);
    try{var d=await getStopForecast(stopCode);setData(d);setTs(new Date());}catch(e){setError("No s'ha pogut carregar");}
    setLoading(false);
  },[stopCode]);

  useEffect(function(){load();var i=setInterval(load,30000);return function(){clearInterval(i);};},[load]);

  var parade=data&&data.parades?data.parades[0]:null;

  return React.createElement("div",{className:"ov",onClick:function(e){if(e.target===e.currentTarget)onClose();}},
    React.createElement("div",{className:"pn"},
      React.createElement("div",{className:"pn-h"},
        React.createElement("div",{style:{flex:1,minWidth:0}},
          React.createElement("h3",null,stopName),
          React.createElement("div",{className:"sc"},"PARADA ",stopCode)
        ),
        React.createElement("div",{className:"pn-ha"},
          React.createElement("button",{onClick:onToggleFav,title:isFav?"Eliminar de preferits":"Afegir a preferits"},isFav?"♥":"♡"),
          React.createElement("button",{onClick:onClose},"✕")
        )
      ),
      React.createElement("div",{className:"pn-b"},
        loading&&!data&&React.createElement("div",{className:"ld"},React.createElement("div",{className:"spin"})),
        error&&React.createElement("div",null,
          React.createElement("p",{className:"err"},error),
          React.createElement("button",{className:"btn btn-r btn-s",onClick:load,style:{marginTop:8}},"REINTENTAR")
        ),
        parade&&!loading&&React.createElement("div",null,
          ts&&React.createElement("div",{className:"pn-upd"},"Actualitzat: ",ts.toLocaleTimeString("ca-ES")),
          parade.linies_trajectes.length===0&&React.createElement("div",{className:"emp"},
            React.createElement("span",null,"🚌"),
            React.createElement("p",null,"No hi ha busos en aquest moment")
          ),
          parade.linies_trajectes.map(function(lt,i){
            return React.createElement("div",{className:"lc",key:i},
              React.createElement("div",{className:"lc-h"},
                React.createElement("div",{className:"flx-g"},
                  React.createElement("span",{className:"lb"},lt.nom_linia||lt.codi_linia),
                  React.createElement("span",{className:"db"},dirLabel(lt.id_sentit))
                ),
                React.createElement("div",{className:"dest"},"→ ",lt.desti_trajecte||"—")
              ),
              lt.propers_busos.length===0
                ?React.createElement("p",{className:"text-muted"},"Sense previsió disponible")
                :React.createElement("div",{className:"arr"},
                  lt.propers_busos.slice(0,4).map(function(b,j){
                    var m=getMinsUntil(b.temps_arribada);
                    return React.createElement("div",{className:"ab "+(m<=2?"ab-red":m<=7?"ab-yel":"ab-grn"),key:j},
