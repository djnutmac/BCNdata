<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMB Barcelona - 16:9 Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-body: #000000;
            --bg-header: #2a2a2a;
            --bg-row: #111111;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --divider: #333333;
            
            /* TMB Colors */
            --color-H: #004ebc;
            --color-V: #6fb62b;
            --color-D: #9b59b6;
            --color-N: #f1c40f;
            --color-std: #c0392b;
        }

        body {
            background-color: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 16:9 Container */
        .display-container {
            width: 95vw;
            aspect-ratio: 16/9; /* Changed to 16:9 */
            max-height: 95vh; /* Ensure it fits on screen */
            background-color: var(--bg-body);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* HEADER SECTION */
        .header {
            background-color: var(--bg-header);
            padding: 1.5vw 2.5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
            height: 15%; /* Adjusted for 16:9 */
            position: relative;
            z-index: 50; /* For search dropdown */
        }

        .header-left {
            display: flex;
            flex-direction: column;
            width: 60%; /* Take more space for search */
            position: relative;
        }

        .stop-label {
            font-size: 1vw; /* Adjusted sizes for 16:9 */
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.2vw;
            display: flex;
            align-items: center;
            gap: 0.5vw;
        }

        .stop-name {
            font-size: 3vw;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50vw;
        }

        /* Search Input Styling */
        .search-input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 2.5vw; /* Slightly smaller to fit */
            font-weight: 700;
            width: 100%;
            outline: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        
        .search-input:focus {
            border-bottom-color: var(--text-muted);
        }
        
        .search-input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        /* Search Results Dropdown */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--bg-header);
            border: 1px solid #444;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 40vh;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .search-item {
            padding: 1vw 1.5vw;
            cursor: pointer;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-item:hover {
            background-color: #3a3a3a;
        }

        .item-name {
            font-size: 1.2vw;
            font-weight: 600;
            color: white;
        }

        .item-code {
            font-size: 1vw;
            color: var(--text-muted);
            background: #222;
            padding: 0.2vw 0.5vw;
            border-radius: 4px;
        }

        .header-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            gap: 0.5vw;
        }
        
        .op-id {
            font-size: 1vw;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .clock {
            font-size: 2vw;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5vw;
        }

        /* BUS LIST SECTION */
        .bus-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-row);
            overflow: hidden; /* Hide extra rows if any */
        }

        .bus-row {
            height: 20%; /* Adattato per riempire lo spazio esattamente con 5 righe */
            display: flex;
            align-items: center;
            padding: 0 2.5vw;
            border-bottom: 1px solid var(--divider);
            animation: fadeIn 0.5s ease-out;
            position: relative;
        }
        
        .bus-row::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            bottom: 15%;
            width: 0.4vw;
            background-color: #444;
            border-radius: 0 4px 4px 0;
        }

        .route-col {
            width: 15%;
            display: flex;
            align-items: center;
        }

        .route-badge {
            padding: 0.3vw 0.8vw; /* Adjusted for 16:9 */
            min-width: 4vw;
            text-align: center;
            border-radius: 6px;
            font-size: 1.8vw; /* Adjusted */
            font-weight: 700;
            color: white;
            background-color: var(--color-std); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .type-H .route-badge { background-color: var(--color-H); }
        .type-V .route-badge { background-color: var(--color-V); }
        .type-D .route-badge { background-color: var(--color-D); }
        .type-N .route-badge { background-color: var(--color-N); color: black; }

        .dest-col {
            width: 65%;
            padding-left: 1vw;
            font-size: 2vw; /* Adjusted */
            font-weight: 600;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .time-col {
            width: 20%;
            text-align: right;
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            gap: 0.5vw;
        }

        .arrival-time {
            font-size: 2.2vw; /* Adjusted */
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        .arrival-unit {
            font-size: 1vw;
            font-weight: 500;
            color: var(--text-muted);
        }
        
        .imminent-text {
            color: #4cd137;
        }

        /* FOOTER */
        .footer-alert {
            height: 10%; /* Adjusted for 16:9 */
            background-color: #c0392b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2.5vw;
            color: white;
            font-weight: 600;
            font-size: 1.2vw;
        }
        
        .footer-left {
            display: flex;
            align-items: center;
            width: 70%;
        }
        
        .footer-badge {
            background: rgba(0,0,0,0.3);
            padding: 0.2vw 0.8vw;
            border-radius: 4px;
            margin-right: 1.5vw;
            font-weight: 700;
        }

        /* Search Footer Styling */
        .footer-right {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 0.5vw 1vw;
            border-radius: 6px;
            width: 25vw;
            gap: 0.5vw;
            transition: background 0.2s;
        }
        
        .footer-right:focus-within {
            background: rgba(0,0,0,0.4);
        }

        .search-input-footer {
            background: transparent;
            border: none;
            color: white;
            font-size: 1vw;
            font-weight: 500;
            width: 100%;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .search-input-footer::placeholder {
            color: rgba(255,255,255,0.6);
        }

        /* Search Results Dropdown (Opening Upwards) */
        .search-results-footer {
            position: absolute;
            bottom: calc(100% + 0.5vw); /* Apre verso l'alto */
            right: 0;
            width: 100%;
            background: var(--bg-header);
            border: 1px solid #444;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            max-height: 40vh;
            overflow-y: auto;
            display: none;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .search-item {
            padding: 1vw 1.5vw;
            cursor: pointer;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-item:first-child { border-top: none; }

        .search-item:hover {
            background-color: #3a3a3a;
        }

        .item-name {
            font-size: 1vw;
            font-weight: 600;
            color: white;
        }

        .item-code {
            font-size: 0.9vw;
            color: var(--text-muted);
            background: #222;
            padding: 0.2vw 0.5vw;
            border-radius: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Scrollbar for dropdown */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

    </style>
</head>
<body>

    <div class="display-container">
        
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="stop-label">
                    <i data-lucide="bus" size="18"></i> 
                    FERMATA <span id="stopCodeDisplay">108</span>
                </div>
                <!-- Dynamic Stop Name -->
                <div class="stop-name" id="stopName">Balmes - Gran Via</div>
            </div>
            
            <div class="header-right">
                <div class="op-id">OP ID #<span id="opId">85700</span></div>
                <div class="clock">
                    <i data-lucide="clock" size="24" class="text-gray-400"></i>
                    <span id="clock">08:20 PM</span>
                </div>
            </div>
        </div>

        <!-- Main Content: Bus List -->
        <div class="bus-list" id="busList">
            <div class="flex items-center justify-center h-full text-2xl text-gray-500">Loading...</div>
        </div>

        <!-- Footer -->
        <div class="footer-alert">
            <div class="footer-left">
                <div class="footer-badge">INFO</div>
                <span id="statusMessage" class="whitespace-nowrap overflow-hidden text-ellipsis">Service operating normally across all lines.</span>
            </div>
            
            <!-- Dynamic Search Moved Here -->
            <div class="footer-right">
                <i data-lucide="search" size="16" class="opacity-60"></i>
                <input type="text" id="searchInput" class="search-input-footer" placeholder="Cerca fermata (nome o codice)..." autocomplete="off">
                
                <!-- Dropdown Results -->
                <div id="searchResults" class="search-results-footer">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>

    </div>

    <script>
        // NEW CONFIG
        const APP_ID = "a5d88368";
        const APP_KEY = "4a578607c30c461a8fd7729700711337";
        let currentStopCode = "108"; 
        let currentStopName = "Balmes - Gran Via";
        
        const MAX_ROWS = 5; // Impostato a massimo 5 righe

        // DOM
        const busListEl = document.getElementById('busList');
        const clockEl = document.getElementById('clock');
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const stopCodeDisplay = document.getElementById('stopCodeDisplay');
        const stopNameEl = document.getElementById('stopName');
        const statusMessageEl = document.getElementById('statusMessage');

        // CLOCK
        function updateTime() {
            const now = new Date();
            clockEl.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        lucide.createIcons();

        // ---- 1. BUS DATA LOGIC ----

        async function fetchBusData() {
            const url = `https://api.tmb.cat/v1/ibus/stops/${currentStopCode}?app_id=${APP_ID}&app_key=${APP_KEY}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                
                stopCodeDisplay.textContent = currentStopCode;
                stopNameEl.textContent = currentStopName;

                if (data.data && data.data.ibus && data.data.ibus.length > 0) {
                    renderBuses(data.data.ibus);
                    statusMessageEl.textContent = "TMB Service Active • Updated just now";
                } else {
                    renderEmpty("No buses scheduled for the next hour.");
                    statusMessageEl.textContent = "Service operating normally.";
                }

            } catch (error) {
                console.warn("API Fail -> Demo Data");
                loadDemoData();
                statusMessageEl.textContent = "Offline Mode • Displaying Demo Schedule";
            }
        }

        function renderBuses(buses) {
            busListEl.innerHTML = '';
            
            buses.sort((a, b) => a['t-in-min'] - b['t-in-min']);

            const topBuses = buses.slice(0, MAX_ROWS);

            topBuses.forEach((bus) => {
                const line = bus.line;
                const dest = bus['text-ca'];
                const min = bus['t-in-min'];

                let typeClass = 'type-std';
                if (line.startsWith('H')) typeClass = 'type-H';
                if (line.startsWith('V')) typeClass = 'type-V';
                if (line.startsWith('D')) typeClass = 'type-D';
                if (line.startsWith('N')) typeClass = 'type-N';

                const row = document.createElement('div');
                row.className = `bus-row ${typeClass}`;
                
                let timeHtml = '';
                if (min === 0) {
                    timeHtml = `<span class="arrival-time imminent-text">NOW</span>`;
                } else {
                    timeHtml = `<span class="arrival-time">${min}</span> <span class="arrival-unit">min</span>`;
                }

                row.innerHTML = `
                    <div class="route-col">
                        <div class="route-badge">${line}</div>
                    </div>
                    <div class="dest-col">
                        ${dest}
                    </div>
                    <div class="time-col">
                        ${timeHtml}
                    </div>
                `;

                busListEl.appendChild(row);
            });
            
            // Le righe vuote riempitive sono state rimosse come richiesto
        }

        function renderEmpty(msg) {
             busListEl.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-gray-500">
                    <i data-lucide="info" size="48" class="mb-4 opacity-50"></i>
                    <span class="text-2xl">${msg}</span>
                </div>
             `;
             lucide.createIcons();
        }

        function loadDemoData() {
            const data = [
                { line: "V15", "text-ca": "Vall d'Hebron", "t-in-min": 2 },
                { line: "67", "text-ca": "Cornellà", "t-in-min": 8 },
                { line: "7", "text-ca": "Fòrum", "t-in-min": 14 },
                { line: "H12", "text-ca": "Besòs/Verneda", "t-in-min": 19 },
                { line: "D50", "text-ca": "Paral·lel", "t-in-min": 25 }
            ];
            stopCodeDisplay.textContent = currentStopCode;
            stopNameEl.textContent = currentStopName;
            renderBuses(data);
        }

        // ---- 2. SEARCH LOGIC ----
        
        let searchTimeout;
        let allStopsCache = null;
        let isFetchingStops = false;

        // Carica tutte le fermate una sola volta in background per ricerca istantanea
        async function fetchAllStops() {
            if (allStopsCache || isFetchingStops) return;
            isFetchingStops = true;
            
            const url = `https://api.tmb.cat/v1/transit/parades?app_id=${APP_ID}&app_key=${APP_KEY}`;
            
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Failed to fetch stops");
                const data = await res.json();
                
                if (data && data.features) {
                    // Mappa e salva solo i dati necessari per ottimizzare la memoria
                    allStopsCache = data.features.map(f => ({
                        code: f.properties.codi_parada.toString(),
                        name: f.properties.nom_parada
                    }));
                }
            } catch (err) {
                console.error("Errore nel caricamento del database fermate:", err);
            } finally {
                isFetchingStops = false;
            }
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                searchResults.style.display = 'none';
                return;
            }

            // Debounce più rapido visto che la ricerca è locale
            searchTimeout = setTimeout(() => {
                performSearch(query);
            }, 200);
        });

        // Hide dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.style.display = 'none';
            }
        });
        
        // Show dropdown again if input is clicked and has value
        searchInput.addEventListener('focus', () => {
            if (searchResults.children.length > 0) {
                searchResults.style.display = 'block';
            }
            // Avvia il caricamento se per caso non era ancora partito
            fetchAllStops();
        });

        async function performSearch(query) {
            if (!allStopsCache) {
                searchResults.innerHTML = '<div class="p-4 text-gray-400 text-center text-sm">Caricamento database...</div>';
                searchResults.style.display = 'block';
                fetchAllStops(); // Forza il fetch se non c'è
                return;
            }

            const qLower = query.toLowerCase();
            
            // Filtro locale istantaneo: cerca sia nel nome che nel codice
            const results = allStopsCache.filter(stop => 
                stop.name.toLowerCase().includes(qLower) || 
                stop.code.includes(qLower)
            ).slice(0, 15); // Limita a 15 risultati

            renderSearchResults(results);
        }

        function renderSearchResults(results) {
            searchResults.innerHTML = '';
            
            if (results.length === 0) {
                searchResults.innerHTML = '<div class="p-4 text-gray-400 text-center text-sm">Nessuna fermata trovata</div>';
                searchResults.style.display = 'block';
                return;
            }

            results.forEach(stop => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML = `
                    <span class="item-name">${stop.name}</span>
                    <span class="item-code">#${stop.code}</span>
                `;
                
                div.addEventListener('click', () => {
                    selectStop(stop.code, stop.name);
                });
                
                searchResults.appendChild(div);
            });
            
            searchResults.style.display = 'block';
        }

        function selectStop(code, name) {
            currentStopCode = code;
            currentStopName = name;
            searchInput.value = ''; // Svuota la barra dopo la selezione
            searchResults.style.display = 'none';
            searchInput.blur(); // Remove focus
            
            // Show loading immediately
            busListEl.innerHTML = `<div class="flex items-center justify-center h-full text-2xl text-gray-500">Loading schedule for ${code}...</div>`;
            
            fetchBusData();
        }

        // Init
        fetchBusData();
        fetchAllStops(); // Inizia a scaricare il DB delle fermate immediatamente all'avvio
        setInterval(fetchBusData, 15000); // Aggiornamento ogni 15 secondi

    </script>
</body>
</html>
