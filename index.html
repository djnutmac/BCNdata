<script>

var BASE="https://api.tmb.cat/v1";
var PROXIES=["https://corsproxy.io/?"];

function apiUrl(path){
  var sep=path.indexOf("?")>=0?"&":"?";
  return BASE+path+sep+"app_id="+APP_ID+"&app_key="+APP_KEY;
}

function fetchWithTimeout(url,opts,ms){
  return new Promise(function(resolve,reject){
    var t=setTimeout(function(){reject(new Error("timeout"));},ms);
    fetch(url,opts).then(function(r){clearTimeout(t);resolve(r);}).catch(function(e){clearTimeout(t);reject(e);});
  });
}

async function fetchTMB(path){
  var directUrl=apiUrl(path);
  // try direct
  try{var r=await fetchWithTimeout(directUrl,{headers:{Accept:"application/json"}},8000);if(r.ok)return await r.json();}catch(e){}
  // try proxies
  for(var i=0;i<PROXIES.length;i++){
    try{var r=await fetchWithTimeout(PROXIES[i]+encodeURIComponent(directUrl),{},8000);if(r.ok)return await r.json();}catch(e){}
  }
  throw new Error("API error");
}

// Get all active stops (arrival data with stop IDs, line numbers, wait times)
async function getAllActiveStops(){
  var data=await fetchTMB("/ibus/stops/");
  return (data&&data.data&&data.data.ibus)||[];
}

// Get stop forecast details
async function getStopForecast(code){
  return await fetchTMB("/itransit/bus/parades/"+code);
}

// Get all bus lines
async function getTransitLines(){
  var data=await fetchTMB("/transit/linies/bus?type=json");
  var seen={};
  var feats=data.features||[];
  for(var i=0;i<feats.length;i++){
    var f=feats[i];
    var code=f.properties.CODI_LINIA||"";
    var name=f.properties.NOM_LINIA||"";
    if(code&&!seen[code]) seen[code]={codi_linia:code,nom_linia:name};
  }
  var arr=Object.values(seen);
  arr.sort(function(a,b){
    var an=parseInt(a.codi_linia),bn=parseInt(b.codi_linia);
    if(!isNaN(an)&&!isNaN(bn))return an-bn;
    if(!isNaN(an))return -1;if(!isNaN(bn))return 1;
    return a.codi_linia.localeCompare(b.codi_linia);
  });
  return arr;
}

// Get stops for a line+direction
async function getLineStops(code,direction){
  var path="/transit/parades/bus?type=json&codi_linia="+code;
  if(direction) path+="&id_sentit="+direction;
  return await fetchTMB(path);
}

// Get route itineraries
async function getItineraries(fromLat,fromLon,toLat,toLon){
  return await fetchTMB("/planner/plan?fromPlace="+fromLat+","+fromLon+"&toPlace="+toLat+","+toLon+"&mode=WALK,BUS,TRANSIT&locale=ca");
}

// Geocode a stop name to coordinates using Nominatim
async function geocodeStop(stopName){
  var query=encodeURIComponent(stopName+" Barcelona bus stop");
  try{
    var r=await fetchWithTimeout("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+query,{headers:{"User-Agent":"TMB-Bus-Tracker/1.0"}},5000);
    if(r.ok){
      var data=await r.json();
      if(data&&data.length>0) return {lat:parseFloat(data[0].lat),lon:parseFloat(data[0].lon)};
    }
  }catch(e){}
  return null;
}

function getMinsUntil(ts){return Math.max(0,Math.floor((ts-Math.floor(Date.now()/1000))/60));}
function dirLabel(id){return id===1?"ANADA":"TORNADA";}

// === LocalStorage ===
function loadLS(key,fb){try{var v=localStorage.getItem(key);return v?JSON.parse(v):fb;}catch(e){return fb;}}

  var addStop=useCallback(function(s){setStops(function(p){return p.some(function(x){return x.codi_parada===s.codi_parada;})?p:p.concat([Object.assign({},s,{addedAt:Date.now()})]);});},[]);
  var removeStop=useCallback(function(c){setStops(function(p){return p.filter(function(x){return x.codi_parada!==c;});});},[]);
  var isStopFav=useCallback(function(c){return stops.some(function(x){return x.codi_parada===c;});},[stops]);
  var addLine=useCallback(function(l){setLines(function(p){return p.some(function(x){return x.codi_linia===l.codi_linia;})?p:p.concat([Object.assign({},l,{addedAt:Date.now()})]);});},[]);

  return {stops:stops,lines:lines,addStop:addStop,removeStop:removeStop,isStopFav:isStopFav,addLine:addLine,removeLine:removeLine,isLineFav:isLineFav};
}
