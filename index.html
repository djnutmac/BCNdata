<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMB Control Center | Dashboard di Rete</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-blue: #00a8ff;
            --accent-red: #e84118;
            --accent-green: #4cd137;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        #map-container { flex: 1; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; background-color: #000; }

        #sidebar {
            width: 450px;
            height: 100%;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); background: #2a2a2a; }
        .sidebar-header h1 { font-size: 1.2rem; color: var(--accent-blue); display: flex; align-items: center; gap: 10px; }
        .search-box { margin-top: 15px; position: relative; }
        .search-box input { width: 100%; padding: 12px 15px; padding-left: 40px; background-color: #111; border: 1px solid var(--border-color); color: white; border-radius: 6px; }
        #search-results { position: absolute; top: 100%; left: 0; width: 100%; background: #222; border: 1px solid var(--border-color); max-height: 200px; overflow-y: auto; z-index: 10; display: none; }
        .search-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .search-item:hover { background-color: #333; }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 20px; }
        .section-title { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #333; }
        .layer-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-toggle { flex: 1; padding: 10px; background-color: #333; border: none; color: white; border-radius: 6px; cursor: pointer; }
        .btn-toggle.active { background-color: var(--accent-green); color: black; }

        #telemetry-panel { background-color: #111; border-radius: 8px; padding: 15px; display: none; border: 1px solid #333; }
        .arrival-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; margin-bottom: 5px; border-radius: 4px; border-left: 4px solid var(--accent-blue); }

        .loader { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: var(--accent-blue); animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .marker-pin { width: 14px; height: 14px; border-radius: 50%; background: white; border: 3px solid var(--accent-blue); box-shadow: 0 0 10px rgba(0, 168, 255, 0.8); }
        .marker-metro { border-color: var(--accent-red); }
        .marker-hub { border-color: var(--accent-green); width: 20px; height: 20px; }
    </style>
</head>
<body>

    <div id="map-container"><div id="map"></div></div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h1><i class="fa-solid fa-satellite-dish"></i> TMB Control Center</h1>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Cerca Linea o Fermata..." autocomplete="off">
                <div id="search-results"></div>
            </div>
        </div>

        <div class="sidebar-content">
            <h2 class="section-title">Controlli Infrastruttura</h2>
            <div class="layer-controls">
                <button class="btn-toggle" id="btn-hubs" onclick="toggleHubs()">Intercanviadors</button>
                <button class="btn-toggle" onclick="clearMap()">Pulisci Mappa</button>
            </div>

            <div id="telemetry-panel">
                <h2 class="section-title">Telemetria</h2>
                <div id="stop-name-display" style="font-weight:bold; margin-bottom:10px;"></div>
                <div id="eta-container"></div>
                <div class="loader" id="telemetry-loader"></div>
            </div>

            <h2 class="section-title">Dettagli Accessi</h2>
            <div id="access-panel" style="color:var(--text-muted); font-size: 0.9rem;">Seleziona una fermata Metro.</div>
        </div>
    </div>

    <script>
        const API_ID = 'a5d88368';
        const API_KEY = '4a578607c30c461a8fd7729700711337';
        const BASE_URL = 'https://api.tmb.cat/v1';

        const map = L.map('map', { zoomControl: false }).setView([41.3879, 2.16992], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

        const linesLayer = L.featureGroup().addTo(map);
        const stopsLayer = L.featureGroup().addTo(map);
        const hubsLayer = L.featureGroup().addTo(map);

        let allLinesData = [];
        let hubsActive = false;

        async function fetchTMB(endpoint) {
            const url = `${BASE_URL}${endpoint}?app_id=${API_ID}&app_key=${API_KEY}`;
            try {
                const response = await fetch(url);
                if (!response.ok) return null;
                return await response.json();
            } catch (e) { return null; }
        }

        async function initApp() {
            const busRes = await fetchTMB('/transit/linies/bus');
            const metroRes = await fetchTMB('/transit/linies/metro');
            if(busRes?.features) busRes.features.forEach(f => allLinesData.push({ id: f.properties.CODI_LINIA, name: f.properties.NOM_LINIA, type: 'bus' }));
            if(metroRes?.features) metroRes.features.forEach(f => allLinesData.push({ id: f.properties.CODI_LINIA, name: f.properties.NOM_LINIA, type: 'metro' }));
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const resBox = document.getElementById('search-results');
            if (val.length < 2) { resBox.style.display = 'none'; return; }
            const filtered = allLinesData.filter(l => l.id.toString().toLowerCase().includes(val) || l.name.toLowerCase().includes(val)).slice(0, 8);
            resBox.innerHTML = filtered.map(l => `<div class="search-item" onclick="loadLineOnMap('${l.id}', '${l.type}')">${l.id} - ${l.name}</div>`).join('');
            resBox.style.display = filtered.length ? 'block' : 'none';
        });

        async function loadLineOnMap(lineId, type) {
            linesLayer.clearLayers(); stopsLayer.clearLayers();
            const endpoint = type === 'metro' ? `/transit/linies/metro/${lineId}/estacions` : `/transit/linies/bus/${lineId}/parades`;
            const data = await fetchTMB(endpoint);
            if (!data?.features) return;
            
            const stops = data.features.sort((a,b) => a.properties.ORDRE - b.properties.ORDRE);
            const latlngs = stops.map(s => [s.geometry.coordinates[1], s.geometry.coordinates[0]]);
            L.polyline(latlngs, {color: type === 'metro' ? '#e84118' : '#00a8ff', weight: 4}).addTo(linesLayer);
            
            stops.forEach(s => {
                const marker = L.marker([s.geometry.coordinates[1], s.geometry.coordinates[0]], {
                    icon: L.divIcon({className:'custom-div-icon', html:`<div class="marker-pin ${type==='metro'?'marker-metro':''}"></div>`})
                }).addTo(stopsLayer);
                const nom = s.properties.NOM_PARADA || s.properties.NOM_ESTACIO;
                const codi = s.properties.CODI_PARADA || s.properties.CODI_ESTACIO;
                marker.on('click', () => openTelemetry(codi, nom, lineId, type));
            });
            map.fitBounds(linesLayer.getBounds(), {padding: [50,50]});
        }

        async function openTelemetry(stopCode, name, lineId, type) {
            document.getElementById('telemetry-panel').style.display = 'block';
            document.getElementById('stop-name-display').innerText = name;
            document.getElementById('eta-container').innerHTML = '';
            document.getElementById('telemetry-loader').style.display = 'block';
            
            if (type === 'bus') {
                const data = await fetchTMB(`/ibus/stops/${stopCode}`);
                document.getElementById('telemetry-loader').style.display = 'none';
                const arrivals = data?.data?.ibus?.filter(i => i.line == lineId) || [];
                document.getElementById('eta-container').innerHTML = arrivals.length 
                    ? arrivals.map(a => `<div class="arrival-item">${a.line} - ${a.destination} <span style="float:right">${a['t-in-min']} min</span></div>`).join('')
                    : 'Nessun dato.';
            } else {
                document.getElementById('telemetry-loader').style.display = 'none';
                document.getElementById('eta-container').innerHTML = 'Info linea frequente.';
            }
        }

        async function toggleHubs() {
            hubsActive = !hubsActive;
            if (hubsActive) {
                const data = await fetchTMB('/transit/intercanviadors');
                if (!data?.features) { alert('Dataset interscambi non disponibile.'); hubsActive = false; return; }
                data.features.forEach(h => L.marker([h.geometry.coordinates[1], h.geometry.coordinates[0]], {icon: L.divIcon({className:'custom-div-icon', html:'<div class="marker-pin marker-hub"></div>'})}).addTo(hubsLayer));
                document.getElementById('btn-hubs').classList.add('active');
            } else {
                hubsLayer.clearLayers();
                document.getElementById('btn-hubs').classList.remove('active');
            }
        }

        function clearMap() { linesLayer.clearLayers(); stopsLayer.clearLayers(); document.getElementById('telemetry-panel').style.display = 'none'; }
        window.onload = initApp;
    </script>
</body>
</html>
