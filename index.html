<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Data BCN - Sensori Reali</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { z-index: 1; }
        
        /* Stile Console Hacker per mostrare i log reali */
        #api-console {
            font-family: 'Courier New', Courier, monospace;
            scrollbar-width: thin;
            scrollbar-color: #4ade80 #111827;
        }
        #api-console::-webkit-scrollbar { width: 6px; }
        #api-console::-webkit-scrollbar-track { background: #111827; }
        #api-console::-webkit-scrollbar-thumb { background: #4ade80; border-radius: 3px; }

        .traffic-marker, .air-marker {
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 10px;
        }
        .air-marker { border-radius: 4px; border: 2px solid #3b82f6; } /* Quadrato per l'aria */
    </style>
</head>
<body class="flex flex-col h-screen bg-gray-900 text-gray-100 overflow-hidden">

    <header class="bg-black border-b border-gray-800 p-4 flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <i data-lucide="database" class="text-green-500"></i>
            <div>
                <h1 class="text-xl font-bold text-white tracking-wide">OPEN DATA BCN DIRECT<span class="text-red-500 animate-pulse ml-2">● LIVE</span></h1>
                <p class="text-xs text-gray-400">Connessione nativa CKAN API: opendata-ajuntament.barcelona.cat</p>
            </div>
        </div>
        <button onclick="fetchAllData()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded border border-gray-600 flex items-center gap-2 text-sm transition-colors">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Forza Aggiornamento
        </button>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Mappa a sinistra -->
        <div id="map" class="flex-1 h-1/2 md:h-full relative border-r border-gray-800"></div>

        <!-- Sidebar Dati Reali a destra -->
        <div class="w-full md:w-[450px] bg-gray-900 flex flex-col h-1/2 md:h-full z-10">
            
            <!-- Liste Sensori (Aria e Traffico) -->
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
                
                <!-- Qualità dell'Aria -->
                <div>
                    <h2 class="text-sm font-bold uppercase tracking-wider text-blue-400 mb-3 border-b border-gray-800 pb-1">
                        <i data-lucide="wind" class="w-4 h-4 inline mr-1"></i> Sensori Aria (Ultime Letture)
                    </h2>
                    <div id="air-list" class="space-y-2">
                        <div class="text-xs text-gray-500 italic">In attesa di connessione all'API CKAN...</div>
                    </div>
                </div>

                <!-- Traffico (Trams) -->
                <div>
                    <h2 class="text-sm font-bold uppercase tracking-wider text-orange-400 mb-3 border-b border-gray-800 pb-1">
                        <i data-lucide="car" class="w-4 h-4 inline mr-1"></i> Traffico Trams (Stato in tempo reale)
                    </h2>
                    <div id="traffic-list" class="space-y-2">
                        <div class="text-xs text-gray-500 italic">In attesa di connessione all'API CKAN...</div>
                    </div>
                </div>
            </div>

            <div class="h-48 shrink-0 bg-gray-950 border-t border-gray-800 flex flex-col">
                <div class="bg-black text-xs font-bold text-gray-500 p-2 border-b border-gray-800 uppercase tracking-widest flex justify-between items-center">
                    <span>Terminale API di Sistema</span>
                    <span class="text-[10px] text-green-500 bg-green-500/10 px-2 py-0.5 rounded border border-green-500/20">CKAN REST</span>
                </div>
                <div id="api-console" class="flex-1 overflow-y-auto p-3 text-[11px] leading-relaxed break-all">
                    <!-- Logs iniettati via JS -->
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // 1. INIZIALIZZAZIONE MAPPA E VARIABILI GLOBALI
        const map = L.map('map').setView([41.3851, 2.1734], 13);
        
        // Uso una mappa scura (Dark Matter) per adattarsi al tema "hacker"
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        let mapMarkers = [];
        
        // Endpoint Ufficiale di Barcellona
        const BCN_API_BASE = 'https://opendata-ajuntament.barcelona.cat/data/api/action/';

        function logMsg(msg, isError = false) {
            const consoleEl = document.getElementById('api-console');
            const time = new Date().toLocaleTimeString('it-IT', { hour12: false });
            const color = isError ? 'text-red-500' : 'text-green-400';
            consoleEl.innerHTML += `<div class="mb-1"><span class="text-gray-600">[${time}]</span> <span class="${color}">${msg}</span></div>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // Funzione per aggirare in automatico blocchi CORS del browser se l'API del comune li respinge
        async function fetchCKAN(endpoint) {
            const url = BCN_API_BASE + endpoint;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                logMsg(`⚠️ Connessione diretta fallita. Tentativo di routing via Proxy CORS...`, true);
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                const res = await fetch(proxyUrl);
                return await res.json();
            }
        }

        async function getLiveRecords(packageId, limit) {
            logMsg(`Ricerca pacchetto dati governativo: <span class="text-white">${packageId}</span>`);
            
            // 1. Chiediamo al portale qual è il file di questo mese
            const pkgData = await fetchCKAN(`package_show?id=${packageId}`);
            
            if (!pkgData || !pkgData.success) {
                throw new Error("Pacchetto dati non trovato o API offline.");
            }

            // 2. Troviamo l'ultimo CSV caricato (i dati correnti)
            const resources = pkgData.result.resources.filter(r => r.format.toUpperCase() === 'CSV');
            // Ordina per data di creazione decrescente
            resources.sort((a, b) => new Date(b.created) - new Date(a.created));
            
            if (resources.length === 0) throw new Error("Nessuna risorsa CSV trovata.");
            const latestResource = resources[0];
            
            logMsg(`Identificato dataset corrente: <span class="text-white">${latestResource.name}</span>`);
            logMsg(`Estrazione delle ultime ${limit} righe dal datastore... GET /datastore_search?resource_id=${latestResource.id}`);

            // 3. Facciamo la query al database vero e proprio (ordinato per ID decrescente per avere i più recenti)
            const queryUrl = `datastore_search?resource_id=${latestResource.id}&limit=${limit}&sort=_id%20desc`;
            const searchData = await fetchCKAN(queryUrl);
            
            return searchData.result.records;
        }

        async function processAirQuality() {
            try {
                // Nome del pacchetto ufficiale di Open Data BCN
                const records = await getLiveRecords('qualitat-aire-detall-bcn', 150);
                
                const listEl = document.getElementById('air-list');
                listEl.innerHTML = '';

                // Mappa Coordinate Centraline Note (per posizionarle sulla mappa)
                const knownStations = {
                    '43': { name: "Eixample (Av. Roma)", coords: [41.3853, 2.1534] },
                    '44': { name: "Gràcia (Plaça Gal·la Placídia)", coords: [41.3987, 2.1532] },
                    '50': { name: "Ciutadella", coords: [41.3864, 2.1874] },
                    '54': { name: "Sants", coords: [41.3781, 2.1331] },
                    '57': { name: "Palau Reial (Zona Univ.)", coords: [41.3875, 2.1158] },
                    '58': { name: "Poblenou", coords: [41.4039, 2.2045] }
                };

                // Poiché i nomi delle colonne possono variare in catalano (Estacio vs Estació), usiamo regex flessibili
                const parsedData = records.map(row => {
                    const kEstacio = Object.keys(row).find(k => k.match(/estaci/i));
                    const kContaminant = Object.keys(row).find(k => k.match(/contaminant/i));
                    const kValor = Object.keys(row).find(k => k.match(/valor/i));
                    const kData = Object.keys(row).find(k => k.match(/data/i) || k === 'Dia');
                    const kHora = Object.keys(row).find(k => k.match(/hora/i) || k === 'Hora');

                    return {
                        id: row[kEstacio],
                        contaminant: row[kContaminant],
                        value: row[kValor],
                        date: row[kData],
                        time: row[kHora]
                    };
                }).filter(r => r.id && r.contaminant && r.value !== undefined);

                // Raggruppa per centralina per non intasare la lista
                const latestPerStation = {};
                parsedData.forEach(d => {
                    if(!latestPerStation[d.id]) latestPerStation[d.id] = [];
                    // Evita duplicati dello stesso inquinante
                    if(!latestPerStation[d.id].find(x => x.contaminant === d.contaminant)) {
                        latestPerStation[d.id].push(d);
                    }
                });

                logMsg(`Dati Aria processati con successo. Trovate letture per ${Object.keys(latestPerStation).length} centraline.`);

                // Disegna su UI e Mappa
                Object.keys(latestPerStation).forEach(stationId => {
                    const readings = latestPerStation[stationId];
                    const stationInfo = knownStations[stationId] || { name: `Stazione #${stationId}`, coords: getFallbackCoords(stationId) };
                    
                    // Crea stringa inquinanti
                    const polString = readings.map(r => `<span class="bg-gray-800 px-2 py-1 rounded text-white text-xs border border-gray-700"><b>${r.contaminant}</b>: ${r.value}</span>`).join(' ');

                    // Item Lista
                    const item = document.createElement('div');
                    item.className = 'bg-gray-800 p-3 rounded border border-gray-700 hover:border-blue-500 cursor-pointer transition-colors';
                    item.onclick = () => map.flyTo(stationInfo.coords, 16);
                    item.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div class="font-bold text-gray-200">${stationInfo.name}</div>
                            <div class="text-[10px] text-gray-500 bg-gray-900 px-2 py-0.5 rounded">ID: ${stationId}</div>
                        </div>
                        <div class="flex flex-wrap gap-2">${polString}</div>
                    `;
                    listEl.appendChild(item);

                    // Marker Mappa
                    const iconHtml = `<div class="air-marker bg-blue-600 w-5 h-5 opacity-90 hover:scale-150 transition-transform"></div>`;
                    const customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [20,20], iconAnchor: [10,10] });
                    const marker = L.marker(stationInfo.coords, { icon: customIcon }).addTo(map);
                    marker.bindTooltip(`<b>${stationInfo.name}</b><br/>Aria (Ultimo Rilevamento)`);
                    mapMarkers.push(marker);
                });

            } catch (error) {
                logMsg(`Errore elaborazione Qualità Aria: ${error.message}`, true);
                document.getElementById('air-list').innerHTML = `<div class="text-red-500 text-sm">Errore ricezione dati: ${error.message}</div>`;
            }
        }

        async function processTraffic() {
            try {
                // 'trams' è il nome ufficiale del dataset BCN per i segmenti stradali
                const records = await getLiveRecords('trams', 250);
                
                const listEl = document.getElementById('traffic-list');
                listEl.innerHTML = '';

                // Schema Colori Ufficiale Traffico BCN (Stato 0 a 6)
                const trafficStates = {
                    0: { label: "Sconosciuto", color: "bg-gray-600", border: "border-gray-500" },
                    1: { label: "Molt fluid", color: "bg-green-500", border: "border-green-400" },
                    2: { label: "Fluid", color: "bg-green-400", border: "border-green-300" },
                    3: { label: "Dens", color: "bg-yellow-400", border: "border-yellow-300" },
                    4: { label: "Molt dens", color: "bg-orange-500", border: "border-orange-400" },
                    5: { label: "Congestió", color: "bg-red-600", border: "border-red-500" },
                    6: { label: "Tallat (Chiusa)", color: "bg-black", border: "border-gray-700" }
                };

                // Estrazione robusta
                const parsedTrams = records.map(row => {
                    const kId = Object.keys(row).find(k => k.match(/id_tram/i) || k === 'idTram');
                    const kState = Object.keys(row).find(k => k.match(/estat_actual/i) || k === 'estatActual');
                    return { id: row[kId], state: parseInt(row[kState]) };
                }).filter(r => r.id && !isNaN(r.state));

                // Evitiamo di inserire 250 elementi in lista, mettiamo solo i peggiori o un campione
                const sortedTrams = parsedTrams.sort((a,b) => b.state - a.state); // Più congestionati prima
                const displayTrams = sortedTrams.slice(0, 50); // Mostra top 50 in lista

                logMsg(`Dati Traffico processati. Identificati ${parsedTrams.length} tratti stradali.`);

                displayTrams.forEach(tram => {
                    const stateObj = trafficStates[tram.state] || trafficStates[0];
                    const coords = getFallbackCoords(tram.id, true); // Genera pos. fissa per ID tram

                    // Elemento Lista
                    const item = document.createElement('div');
                    item.className = 'bg-gray-800 p-2 rounded flex justify-between items-center cursor-pointer hover:bg-gray-700';
                    item.onclick = () => map.flyTo(coords, 17);
                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full ${stateObj.color}"></div>
                            <div class="text-sm text-gray-300 font-mono">Tram #${tram.id}</div>
                        </div>
                        <div class="text-xs ${stateObj.color.replace('bg-', 'text-')} font-bold uppercase">${stateObj.label}</div>
                    `;
                    listEl.appendChild(item);

                    // Marker Mappa
                    const iconHtml = `<div class="traffic-marker ${stateObj.color} ${stateObj.border} w-4 h-4 opacity-80 hover:scale-150 transition-transform"></div>`;
                    const customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [16,16], iconAnchor: [8,8] });
                    const marker = L.marker(coords, { icon: customIcon }).addTo(map);
                    marker.bindTooltip(`Tram ID: ${tram.id} <br/> Stato: ${stateObj.label}`);
                    mapMarkers.push(marker);
                });

            } catch (error) {
                logMsg(`Errore elaborazione Traffico: ${error.message}`, true);
                document.getElementById('traffic-list').innerHTML = `<div class="text-red-500 text-sm">Errore ricezione dati: ${error.message}</div>`;
            }
        }

        // Helper per posizionare i sensori sulla mappa se non si hanno le coordinate precise (distribuzione matematica basata su ID per mantenerli fissi)
        function getFallbackCoords(idString, isTraffic = false) {
            let numId = parseInt(idString.toString().replace(/\D/g,'')) || Math.random() * 1000;
            // Area geografica BCN approssimata: Lat 41.36 - 41.42, Lng 2.11 - 2.20
            let latOffset = isTraffic ? ((numId * 7) % 60) / 1000 : ((numId * 13) % 60) / 1000;
            let lngOffset = isTraffic ? ((numId * 11) % 90) / 1000 : ((numId * 17) % 90) / 1000;
            return [41.36 + latOffset, 2.11 + lngOffset];
        }

        async function fetchAllData() {
            document.getElementById('api-console').innerHTML = '';
            mapMarkers.forEach(m => map.removeLayer(m));
            mapMarkers = [];
            
            logMsg("=== INIZIO ACQUISIZIONE DATI REALI ===");
            
            // Avvia query in parallelo
            await Promise.all([
                processAirQuality(),
                processTraffic()
            ]);

            logMsg("=== RICEZIONE COMPLETATA. DATI MAPPA AGGIORNATI ===");
        }

        window.onload = () => {
            logMsg("Inizializzazione ambiente e validazione sorgenti BCN...");
            fetchAllData();
            
            // Ricarica automaticamente ogni minuto, come farebbe un terminale cittadino
            setInterval(fetchAllData, 60000);
        };
    </script>
</body>
</html>
