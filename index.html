<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcellona Live - Rete Mobilità Reale</title>
    
    <!-- Tailwind CSS per il design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS per la mappa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        #map { z-index: 1; }
        
        /* Animazione per le stazioni critiche (vuote) */
        .pulse-red {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-red-anim 2s infinite;
        }
        @keyframes pulse-red-anim {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Scrollbar personalizzata per la sidebar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-gray-800">

    <!-- Header / Navbar -->
    <header class="bg-indigo-900 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <i data-lucide="satellite" class="text-indigo-400"></i>
            <div>
                <h1 class="text-xl font-bold leading-tight">Barcelona Live Sensors</h1>
                <p class="text-xs text-indigo-300">Dati ufficiali in tempo reale: Rete Bicing BCN</p>
            </div>
        </div>
        <div class="text-sm bg-indigo-800 px-3 py-1 rounded-full border border-indigo-700 flex items-center gap-2 shadow-inner" id="connection-status">
            <div class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse" id="status-dot"></div>
            <span id="status-text">Connessione API in corso...</span>
        </div>
    </header>

    <!-- Alert Panel (Semaforo) -->
    <div class="bg-white border-b shadow-sm p-4 grid grid-cols-3 gap-4 shrink-0 z-10">
        <div class="flex items-center justify-between p-3 bg-red-50 rounded-lg border border-red-100">
            <div class="flex items-center gap-3">
                <div class="text-2xl">🔴</div>
                <div>
                    <div class="text-sm text-gray-500 font-medium">Stazioni Vuote (Critiche)</div>
                    <div class="text-xl font-bold text-red-700" id="count-critical">0</div>
                </div>
            </div>
        </div>
        <div class="flex items-center justify-between p-3 bg-yellow-50 rounded-lg border border-yellow-100">
            <div class="flex items-center gap-3">
                <div class="text-2xl">🟡</div>
                <div>
                    <div class="text-sm text-gray-500 font-medium">In Esaurimento (1-2 Bici)</div>
                    <div class="text-xl font-bold text-yellow-700" id="count-warning">0</div>
                </div>
            </div>
        </div>
        <div class="flex items-center justify-between p-3 bg-green-50 rounded-lg border border-green-100">
            <div class="flex items-center gap-3">
                <div class="text-2xl">🟢</div>
                <div>
                    <div class="text-sm text-gray-500 font-medium">Ben Fornite (>2 Bici)</div>
                    <div class="text-xl font-bold text-green-700" id="count-normal">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Left: Map -->
        <div id="map" class="flex-1 h-1/2 md:h-full relative"></div>

        <!-- Right: Sidebar (Details & List) -->
        <div class="w-full md:w-[400px] lg:w-[450px] bg-white border-l shadow-2xl flex flex-col h-1/2 md:h-full z-10">
            
            <!-- Realtime Detail Panel (Sostituisce il grafico) -->
            <div class="p-5 border-b bg-gray-50 shrink-0" id="detail-panel">
                <div class="flex items-center gap-2 mb-2 text-gray-400">
                    <i data-lucide="info" class="w-5 h-5"></i>
                    <span class="text-sm">Seleziona una stazione sulla mappa</span>
                </div>
                <h2 class="text-lg font-bold text-gray-300">Nessuna stazione selezionata</h2>
            </div>

            <!-- List Section -->
            <div class="p-4 flex-1 overflow-y-auto flex flex-col">
                <div class="flex justify-between items-center mb-4 shrink-0">
                    <h3 class="font-semibold text-gray-700">Tutte le <span id="total-sensors">0</span> stazioni</h3>
                    <div class="flex gap-2 text-sm bg-gray-100 p-1 rounded-lg">
                        <button onclick="filterSensors('all')" id="btn-all" class="px-3 py-1 rounded-md bg-white shadow-sm text-indigo-600 font-medium transition-all">Tutte</button>
                        <button onclick="filterSensors('ebike')" id="btn-ebike" class="px-3 py-1 rounded-md text-gray-500 hover:text-gray-900 transition-all">Con E-Bike</button>
                        <button onclick="filterSensors('red')" id="btn-red" class="px-3 py-1 rounded-md text-gray-500 hover:text-gray-900 transition-all">Vuote</button>
                    </div>
                </div>
                <!-- Lista virtualizzata/ottimizzata -->
                <div id="sensor-list" class="space-y-2 flex-1">
                    <!-- Iniettato via JS -->
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // 1. INIZIALIZZAZIONE MAPPA
        const map = L.map('map').setView([41.3851, 2.1734], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO | Data: Open Data BCN',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // 2. VARIABILI GLOBALI
        let stationsData = [];
        let mapMarkers = [];
        let currentFilter = 'all';

        // Endpoint reali di Barcellona Bicing (GBFS API)
        const URL_INFO = 'https://barcelona.publicbikesystem.net/customer/gbfs/v2/en/station_information';
        const URL_STATUS = 'https://barcelona.publicbikesystem.net/customer/gbfs/v2/en/station_status';

        // 3. FETCH DAI SERVER REALI DI BARCELLONA
        async function fetchRealtimeData() {
            try {
                // Aggiorna UI stato
                document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-yellow-400 animate-pulse';
                document.getElementById('status-text').innerText = 'Sincronizzazione API...';

                // Richiesta parallela di anagrafica e stato in tempo reale
                const [infoResponse, statusResponse] = await Promise.all([
                    fetch(URL_INFO),
                    fetch(URL_STATUS)
                ]);

                if (!infoResponse.ok || !statusResponse.ok) throw new Error("Errore HTTP");

                const infoJson = await infoResponse.json();
                const statusJson = await statusResponse.json();

                // Creiamo una mappa temporanea per unire i dati per ID
                const infoMap = new Map();
                infoJson.data.stations.forEach(station => {
                    infoMap.set(station.station_id, station);
                });

                // Uniamo anagrafica (coordinate, nome) allo stato (disponibilità)
                const mergedData = statusJson.data.stations.map(status => {
                    const info = infoMap.get(status.station_id);
                    if (!info) return null;

                    const totalBikes = status.num_bikes_available;
                    let mechBikes = 0;
                    let eBikes = 0;
                    
                    // Gestione struttura dati dell'API
                    if (status.num_bikes_available_types) {
                        mechBikes = status.num_bikes_available_types.mechanical || 0;
                        eBikes = status.num_bikes_available_types.ebike || 0;
                    }

                    // Calcolo semaforo per il cruscotto
                    let condition = 'green';
                    if (totalBikes === 0) condition = 'red'; // Stazione svuotata
                    else if (totalBikes <= 2) condition = 'yellow'; // Quasi vuota

                    return {
                        id: status.station_id,
                        name: info.name,
                        lat: info.lat,
                        lng: info.lon, // L'API usa 'lon' invece di 'lng'
                        capacity: info.capacity,
                        available: totalBikes,
                        mechanical: mechBikes,
                        ebike: eBikes,
                        docks: status.num_docks_available,
                        status: condition,
                        lastReported: new Date(status.last_reported * 1000).toLocaleTimeString('it-IT')
                    };
                }).filter(s => s !== null && s.status !== undefined); // Pulizia dati corrotti

                stationsData = mergedData;
                renderDashboard();

                // Aggiorna UI stato (Connesso)
                document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-green-400';
                document.getElementById('status-text').innerText = 'Live - Dati Reali Aggiornati';
                document.getElementById('total-sensors').innerText = stationsData.length;

            } catch (error) {
                console.error("Errore di connessione API:", error);
                document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-red-500';
                document.getElementById('status-text').innerText = 'Errore di connessione API';
            }
        }

        // 4. MOTORE DI RENDERING (MAPPA E LISTA)
        function renderDashboard() {
            let cRed = 0, cYellow = 0, cGreen = 0;
            
            // Pulisci vecchi layer dalla mappa
            mapMarkers.forEach(m => map.removeLayer(m));
            mapMarkers = [];
            
            const listEl = document.getElementById('sensor-list');
            listEl.innerHTML = '';
            
            // DocumentFragment per prestazioni alte (500+ elementi DOM)
            const fragment = document.createDocumentFragment();

            stationsData.forEach(station => {
                // Filtri
                if (currentFilter === 'ebike' && station.ebike === 0) return;
                if (currentFilter === 'red' && station.status !== 'red') return;

                // Aggiorna contatori header (sempre sui totali filtrati o generali)
                if (station.status === 'red') cRed++;
                else if (station.status === 'yellow') cYellow++;
                else cGreen++;

                // Generazione Pallino Mappa Custom
                let colorClass = 'bg-green-500';
                if (station.status === 'red') colorClass = 'bg-red-500 pulse-red';
                if (station.status === 'yellow') colorClass = 'bg-yellow-400';

                // Pallini leggermente più piccoli per gestire 500 stazioni
                const iconHtml = `<div class="w-3 h-3 rounded-full ${colorClass} border border-white shadow-sm cursor-pointer hover:scale-150 transition-transform"></div>`;
                const customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [12,12], iconAnchor: [6,6] });
                
                const marker = L.marker([station.lat, station.lng], { icon: customIcon }).addTo(map);
                marker.bindTooltip(`<b>${station.name}</b><br/>Bici: ${station.available}`);
                marker.on('click', () => selectStation(station, true));
                mapMarkers.push(marker);

                // Generazione Elemento Lista
                const item = document.createElement('div');
                item.className = 'p-3 rounded-lg border bg-white hover:border-indigo-300 cursor-pointer transition-colors flex justify-between items-center group';
                item.onclick = () => selectStation(station, true);
                
                let dotColor = station.status === 'red' ? 'text-red-500' : (station.status === 'yellow' ? 'text-yellow-500' : 'text-green-500');
                
                item.innerHTML = `
                    <div class="truncate mr-3 overflow-hidden">
                        <div class="font-semibold text-gray-800 text-sm truncate group-hover:text-indigo-700 transition-colors">${station.name}</div>
                        <div class="text-xs text-gray-400 mt-0.5 flex gap-2">
                            <span title="E-Bike">⚡ ${station.ebike}</span>
                            <span title="Meccaniche">🚲 ${station.mechanical}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <div class="text-right">
                            <div class="font-bold text-lg leading-none">${station.available}</div>
                            <div class="text-[10px] text-gray-400 uppercase tracking-wider">Disp.</div>
                        </div>
                        <div class="${dotColor} ml-1">●</div>
                    </div>
                `;
                fragment.appendChild(item);
            });

            listEl.appendChild(fragment);

            // Aggiorna cruscotto semaforo solo se non ci sono filtri attivi
            // per mostrare sempre la situazione generale della città
            if (currentFilter === 'all') {
                document.getElementById('count-critical').innerText = cRed;
                document.getElementById('count-warning').innerText = cYellow;
                document.getElementById('count-normal').innerText = cGreen;
            }
        }

        // 5. DETTAGLIO STAZIONE
        function selectStation(station, zoomMap = false) {
            if (zoomMap) {
                map.flyTo([station.lat, station.lng], 16, { duration: 1 });
            }

            const panel = document.getElementById('detail-panel');
            
            // Calcolo percentuale occupazione
            const occupancy = station.capacity > 0 ? (station.available / station.capacity) * 100 : 0;
            let barColor = 'bg-green-500';
            if (station.status === 'red') barColor = 'bg-red-500';
            else if (station.status === 'yellow') barColor = 'bg-yellow-400';

            panel.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <h2 class="text-lg font-bold text-indigo-900 leading-tight pr-2">${station.name}</h2>
                    <span class="text-xs font-mono bg-gray-200 text-gray-600 px-2 py-1 rounded">ID: ${station.id}</span>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="bg-white p-3 rounded-lg border shadow-sm">
                        <div class="text-sm text-gray-500 mb-1">Bici Disponibili</div>
                        <div class="text-2xl font-bold text-gray-800">${station.available}</div>
                        <div class="text-xs text-gray-400 mt-1 flex gap-2">
                            <span class="text-blue-600 font-medium">⚡ ${station.ebike} e-bike</span>
                        </div>
                    </div>
                    <div class="bg-white p-3 rounded-lg border shadow-sm">
                        <div class="text-sm text-gray-500 mb-1">Posti Liberi</div>
                        <div class="text-2xl font-bold text-gray-800">${station.docks}</div>
                        <div class="text-xs text-gray-400 mt-1">su ${station.capacity} totali</div>
                    </div>
                </div>

                <div class="mb-2">
                    <div class="flex justify-between text-xs text-gray-500 mb-1">
                        <span>Svuotamento</span>
                        <span>${station.available} / ${station.capacity}</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                        <div class="${barColor} h-2.5 rounded-full transition-all duration-500" style="width: ${occupancy}%"></div>
                    </div>
                </div>
                
                <div class="text-xs text-right text-gray-400 mt-3">
                    Ultimo ping API: ${station.lastReported}
                </div>
            `;
        }

        // 6. GESTIONE FILTRI
        function filterSensors(type) {
            currentFilter = type;
            
            // Stile bottoni
            const btns = ['btn-all', 'btn-ebike', 'btn-red'];
            btns.forEach(id => {
                const b = document.getElementById(id);
                b.className = 'px-3 py-1 rounded-md text-gray-500 hover:text-gray-900 transition-all'; // Reset
            });
            
            const activeBtn = document.getElementById(`btn-${type}`);
            activeBtn.className = 'px-3 py-1 rounded-md bg-white shadow-sm text-indigo-600 font-medium transition-all';
            
            renderDashboard();
        }

        // 7. START APP
        window.onload = () => {
            // Primo fetch immediato
            fetchRealtimeData();
            
            // Poiché si tratta di dati REALI, chiamiamo le API del Comune 
            // ogni 30 secondi per aggiornare la mappa "live" senza intasare i loro server
            setInterval(fetchRealtimeData, 30000);
        };
    </script>
</body>
</html>
